# /etc/nginx/sites-available/centry.website
# Перенос centry.website с Vercel на VPS в РФ.
# Покрывает: статика (auth-callback, plan-invite, AASA) + лендинг (Flutter Web).

# --- HTTP -> HTTPS redirect (oба хоста) ---
server {
    listen 80;
    listen [::]:80;
    server_name centry.website www.centry.website;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- apex -> www (один канонический хост, как было на Vercel) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name centry.website;

    ssl_certificate     /etc/letsencrypt/live/centry.website/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/centry.website/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.centry.website$request_uri;
}

# --- www: основной vhost ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.centry.website;

    ssl_certificate     /etc/letsencrypt/live/centry.website/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/centry.website/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/centry.website;
    index index.html;

    # === Apple App Site Association (Universal Links) ===
    # Отдаём как application/json, БЕЗ редиректов, БЕЗ расширения.
    location = /.well-known/apple-app-site-association {
        default_type application/json;
        try_files /.well-known/apple-app-site-association =404;
        add_header Cache-Control "public, max-age=3600";
    }
    # Старый путь (legacy), который Vercel тоже отдавал
    location = /apple-app-site-association {
        default_type application/json;
        try_files /apple-app-site-association =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # === Magic link callback (auth) ===
    # Просто отдаём auth-callback.html как есть.
    location = /auth-callback {
        try_files /auth-callback.html =404;
    }
    location = /auth-callback.html {
        try_files /auth-callback.html =404;
    }

    # === Plan invite (rewrites из vercel.json) ===
    # /plan-invite, /plan-invite/<anything>, /invite/<anything> -> invite.html
    location = /plan-invite {
        try_files /plan-invite/index.html /invite.html =404;
    }
    location ^~ /plan-invite/ {
        try_files $uri /plan-invite/index.html /invite.html =404;
    }
    location ^~ /invite/ {
        try_files /invite.html =404;
    }

    # === Прочее: SPA / Flutter Web ===
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Безопасные дефолты
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Долгий кэш для статики Flutter Web
    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # Логи
    access_log /var/log/nginx/centry.website.access.log;
    error_log  /var/log/nginx/centry.website.error.log;
}
