# Bootstrap vhost: HTTP-only, для получения первого Let's Encrypt сертификата
# через webroot challenge. После выпуска серта заменяется на полный vhost.

server {
    listen 80;
    listen [::]:80;
    server_name centry.website www.centry.website;

    root /var/www/centry.website;
    index index.html;

    # ACME challenge для certbot --webroot
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Apple App Site Association (UL должны работать сразу, ещё до HTTPS)
    location = /.well-known/apple-app-site-association {
        default_type application/json;
        try_files /.well-known/apple-app-site-association =404;
    }
    location = /apple-app-site-association {
        default_type application/json;
        try_files /apple-app-site-association =404;
    }

    # Magic link callback
    location = /auth-callback {
        try_files /auth-callback.html =404;
    }

    # Plan invite (rewrites из vercel.json)
    location = /plan-invite { try_files /plan-invite/index.html /invite.html =404; }
    location ^~ /plan-invite/ { try_files $uri /plan-invite/index.html /invite.html =404; }
    location ^~ /invite/ { try_files /invite.html =404; }

    location / {
        try_files $uri $uri/ /index.html =404;
    }

    access_log /var/log/nginx/centry.website.access.log;
    error_log  /var/log/nginx/centry.website.error.log;
}
